<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <clipPath id="round"><rect width="64" height="64" rx="14"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Lock body -->
  <rect x="18" y="32" width="28" height="20" rx="4" fill="white" opacity="0.95"/>
  <!-- Lock shackle -->
  <path d="M22 32 V24 a10 10 0 0 1 20 0 V32" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.95"/>
  <!-- Keyhole -->
  <circle cx="32" cy="40" r="3.5" fill="#6366f1"/>
  <rect x="30.5" y="40" width="3" height="6" rx="1.5" fill="#6366f1"/>
  <!-- Stars / dots suggesting randomness -->
  <circle cx="12" cy="12" r="2" fill="white" opacity="0.5"/>
  <circle cx="52" cy="10" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="54" cy="52" r="2" fill="white" opacity="0.3"/>
  <!-- Corner ribbon (top-left) -->
  <polygon points="0,0 32,0 0,32" fill="black" clip-path="url(#round)"/>
</svg>
