<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <clipPath id="round"><rect width="64" height="64" rx="14"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Text lines -->
  <line x1="16" y1="22" x2="48" y2="22" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Strikethrough line (error) -->
  <line x1="16" y1="31" x2="40" y2="31" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="16" y1="31" x2="40" y2="31" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <!-- Corrected line below -->
  <line x1="16" y1="39" x2="44" y2="39" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Checkmark badge -->
  <circle cx="46" cy="46" r="11" fill="white" opacity="0.95"/>
  <polyline points="40,46 44,50 52,40" fill="none" stroke="#a855f7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Corner ribbon (top-left) -->
  <polygon points="0,0 32,0 0,32" fill="black" clip-path="url(#round)"/>
</svg>
