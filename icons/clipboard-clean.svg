<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <clipPath id="round"><rect width="64" height="64" rx="14"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="14" y="16" width="30" height="36" rx="4" fill="white" opacity="0.95"/>
  <!-- Clipboard clip -->
  <rect x="24" y="12" width="10" height="9" rx="3" fill="white" opacity="0.95"/>
  <rect x="26" y="11" width="6" height="5" rx="2" fill="#0ea5e9"/>
  <!-- Strikethrough lines (dirty text) -->
  <line x1="20" y1="27" x2="38" y2="27" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="33" x2="34" y2="33" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="39" x2="36" y2="39" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sparkle / clean check -->
  <circle cx="46" cy="46" r="10" fill="#0ea5e9" stroke="white" stroke-width="2"/>
  <polyline points="41,46 44.5,49.5 51,42.5" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Corner ribbon (top-left) -->
  <polygon points="0,0 32,0 0,32" fill="black" clip-path="url(#round)"/>
</svg>
