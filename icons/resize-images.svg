<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <clipPath id="round"><rect width="64" height="64" rx="14"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Image frame -->
  <rect x="10" y="14" width="32" height="26" rx="4" fill="white" opacity="0.95"/>
  <!-- Sky in image -->
  <rect x="10" y="14" width="32" height="12" rx="4" fill="#bae6fd" opacity="0.8"/>
  <rect x="10" y="22" width="32" height="4" fill="#bae6fd" opacity="0.8"/>
  <!-- Sun -->
  <circle cx="34" cy="20" r="4" fill="#fde68a"/>
  <!-- Mountain -->
  <polygon points="14,40 24,24 34,40" fill="#6ee7b7"/>
  <polygon points="26,40 34,28 42,40" fill="#34d399"/>
  <!-- Resize arrows (bottom-right corner) -->
  <circle cx="46" cy="46" r="12" fill="#059669" stroke="white" stroke-width="2"/>
  <!-- Arrow NW -->
  <line x1="51" y1="41" x2="41" y2="51" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="41,44 41,51 48,51" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow NE tip -->
  <polyline points="51,48 51,41 44,41" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Corner ribbon (top-left) -->
  <polygon points="0,0 32,0 0,32" fill="black" clip-path="url(#round)"/>
</svg>
